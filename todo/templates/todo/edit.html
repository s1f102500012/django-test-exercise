{% load static %}
<!DOCTYPE html>
<html lang="ja">

  <head>
    <title>To Do Application</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="INIAD">
    <link rel="stylesheet" href="{% static 'todo/style.css' %}">
  </head>

  <body>
    <div class="container">
      <a class="back-link" href="{% url 'detail' task.id %}">&larr; Back to task</a>

      <div class="card">
        <h1 class="page-title">Edit task</h1>
        <p class="subtitle">You can edit tasks from the following form.</p>
        <form action="{% url 'update' task.id %}" method="post">
          {% csrf_token %}
          <div>
            <label for="titleInput">Title</label>
            <input id="titleInput" name="title" type="text" placeholder="Input title" value="{{ task.title }}">
          </div>
          <div>
            <label for="dueInput">Due at</label>
            <input id="dueInput" name="due_at" type="datetime-local" value="{{ task.due_at|date:'Y-m-d H:i' }}">
          </div>
          <div>
            <button type="submit">Submit</button>
          </div>
        </form>
      </div>
    </div>
  </body>

</html>
